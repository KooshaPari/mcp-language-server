version: "3"

vars:
  BINARY: mcp-language-server

tasks:
  default:
    desc: Build the Go binary
    deps: [build]

  build:
    desc: Build the Go binary
    cmds:
      - go build -o {{.BINARY}}

  test:
    desc: Run the Go test suite
    cmds:
      - go test ./...

  lint:
    desc: Run Go formatting, static analysis, and LSP checks
    cmds:
      - |
        unformatted="$(find . -path "./integrationtests/workspaces" -prune -o \
          -path "./integrationtests/test-output" -prune -o \
          -name "*.go" -print | xargs gofmt -l)"
        test -z "$unformatted" || { printf '%s\n' "$unformatted"; exit 1; }
      - go tool staticcheck ./...
      - go tool errcheck ./...
      - |
        find . -path "./integrationtests/workspaces" -prune -o \
          -path "./integrationtests/test-output" -prune -o \
          -name "*.go" -print | xargs gopls check

  clean:
    desc: Remove generated artifacts and expire Go test cache entries
    cmds:
      - go clean -testcache
      - task: clean:artifacts

  clean:artifacts:
    internal: true
    cmds:
      - find . -maxdepth 1 \( -name {{.BINARY}} -o -name coverage.out -o -name coverage.txt \) -delete
      - |
        if test -d integrationtests/test-output; then
          find integrationtests/test-output -depth -mindepth 1 -delete
          rmdir integrationtests/test-output
        fi
      - |
        if test -d integrationtests/snapshots; then
          find integrationtests/snapshots -name "*.snap.diff" -delete
        fi
