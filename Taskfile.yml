version: "3"

tasks:
  default:
    desc: Build the Go binary
    deps: [build]

  build:
    desc: Build mcp-language-server
    cmds:
      - go build -o mcp-language-server

  test:
    desc: Run the Go test suite
    cmds:
      - go test ./...

  lint:
    desc: Run Go formatting and static analysis checks
    cmds:
      - gofmt -l .
      - test -z "$(gofmt -l .)"
      - go tool staticcheck ./...
      - go tool errcheck ./...

  clean:
    desc: Remove Go build and coverage artifacts
    cmds:
      - go clean ./...
      - task: clean:artifacts

  clean:artifacts:
    internal: true
    cmds:
      - find . -maxdepth 1 \( -name mcp-language-server -o -name coverage.out -o -name coverage.txt \) -delete
